{% extends "admin/base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="admin-auth-card">
  <p class="eyebrow">Cloth Store Admin</p>
  <h1>Log in to your store</h1>
  <form method="POST" novalidate>
    {{ form.hidden_tag() }}
    <label>{{ form.email.label }}
      {{ form.email(placeholder="owner@store.com") }}
      {% for error in form.email.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <label>{{ form.password.label }}
      {{ form.password() }}
      {% for error in form.password.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <button class="btn" type="submit">Log in</button>
  </form>
  <p class="admin-auth-switch">New store? <a href="{{ url_for('admin.register') }}">Create an account</a></p>
</div>
{% endblock %}
