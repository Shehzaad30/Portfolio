{% extends "admin/base.html" %}
{% block title %}Create your store account{% endblock %}
{% block content %}
<div class="admin-auth-card">
  <p class="eyebrow">Cloth Store Admin</p>
  <h1>Create your store account</h1>
  <form method="POST" novalidate>
    {{ form.hidden_tag() }}
    <label>{{ form.store_name.label }}
      {{ form.store_name(placeholder="Your store name") }}
      {% for error in form.store_name.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <label>{{ form.name.label }}
      {{ form.name(placeholder="Your name") }}
      {% for error in form.name.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <label>{{ form.email.label }}
      {{ form.email(placeholder="owner@store.com") }}
      {% for error in form.email.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <label>{{ form.password.label }}
      {{ form.password() }}
      {% for error in form.password.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <label>{{ form.confirm_password.label }}
      {{ form.confirm_password() }}
      {% for error in form.confirm_password.errors %}<span class="field-error">{{ error }}</span>{% endfor %}
    </label>
    <button class="btn" type="submit">Create account</button>
  </form>
  <p class="admin-auth-switch">Already have an account? <a href="{{ url_for('admin.login') }}">Log in</a></p>
</div>
{% endblock %}
